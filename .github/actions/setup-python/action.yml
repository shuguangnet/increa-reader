name: 'Setup Python'
description: 'Install Python, pip cache, and optional dependencies'

inputs:
  python-version:
    description: 'Python version'
    required: false
    default: '3.13'
  cache-dependency-path:
    description: 'Path(s) for pip cache dependency hashing'
    required: false
    default: ''
  install-dev:
    description: 'Whether to install [dev] extras'
    required: false
    default: 'false'
  working-directory:
    description: 'Directory to run pip install in'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install package dependencies
      if: inputs.working-directory != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [[ -f requirements.txt ]]; then
          pip install -r requirements.txt
        fi
        if [[ "${{ inputs.install-dev }}" == 'true' ]]; then
          pip install -e ".[dev]"
        fi
