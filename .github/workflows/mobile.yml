name: Mobile — Build iOS & Android

on:
  push:
    branches: [main]
    paths:
      - 'packages/desktop/**'
      - 'packages/ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/desktop/**'
      - 'packages/ui/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'check'
        type: choice
        options:
          - check
          - ios
          - android
          - android-signed

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Prerequisite Check ──
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-linux-android,armv7-linux-androideabi

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install desktop deps
        run: cd packages/desktop && pnpm install --frozen-lockfile

      - name: Check prerequisites
        run: cd packages/desktop && bash build-mobile.sh check

  # ── iOS Build ──
  ios:
    if: github.event.inputs.platform == 'ios' || github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install desktop deps
        run: cd packages/desktop && pnpm install --frozen-lockfile

      - name: Init iOS project
        run: cd packages/desktop && bash build-mobile.sh init:ios
        env:
          INCREA_IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - name: Build iOS
        run: cd packages/desktop && bash build-mobile.sh ios
        env:
          INCREA_IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            packages/desktop/src-tauri/target/ios/release/*.ipa
            packages/desktop/src-tauri/gen/apple/build/outputs/ipa/**/*.ipa
          retention-days: 7

  # ── Android Build ──
  android:
    if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'android-signed' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install desktop deps
        run: cd packages/desktop && pnpm install --frozen-lockfile

      - name: Init Android project
        run: cd packages/desktop && bash build-mobile.sh init:android
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.ndk-home }}
          INCREA_ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          INCREA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          INCREA_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          INCREA_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android
        run: cd packages/desktop && bash build-mobile.sh android
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
          NDK_HOME: ${{ steps.setup-android.outputs.ndk-home }}
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.ndk-home }}
          INCREA_ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          INCREA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          INCREA_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          INCREA_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Android APK (optional)
        if: github.event.inputs.platform == 'android-signed'
        run: cd packages/desktop && bash build-mobile.sh sign:android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            packages/desktop/src-tauri/target/android/release/*.apk
            packages/desktop/src-tauri/target/android/release/*.aab
            packages/desktop/src-tauri/gen/android/app/build/outputs/**/*.apk
            packages/desktop/src-tauri/gen/android/app/build/outputs/**/*.aab
          retention-days: 7