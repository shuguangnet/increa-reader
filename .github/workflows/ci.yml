name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'workspace/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'workspace/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      server: ${{ steps.filter.outputs.server }}
      mcp: ${{ steps.filter.outputs.mcp }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shell: ${{ steps.filter.outputs.shell }}
      docker: ${{ steps.filter.outputs.docker }}
      security: ${{ steps.filter.outputs.security }}
      workflows: ${{ steps.filter.outputs.workflows }}
      server_smoke: ${{ steps.filter.outputs.server_smoke }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/ui/**'
            server:
              - '.github/workflows/ci.yml'
              - 'packages/server/**'
            mcp:
              - '.github/workflows/ci.yml'
              - 'packages/pdf-reader-mcp/**'
            desktop:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/desktop/**'
              - 'packages/ui/**'
            shell:
              - '.github/workflows/ci.yml'
              - 'deploy-local.sh'
              - 'deploy.sh'
              - 'setup.sh'
              - 'start.sh'
              - 'scripts/**/*.sh'
              - 'packages/**/*.sh'
            docker:
              - 'Dockerfile'
              - 'scripts/ci/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/ui/**'
              - 'packages/server/**'
              - 'packages/pdf-reader-mcp/**'
            security:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/dependency-review.yml'
              - 'packages/ui/package.json'
              - 'packages/desktop/package.json'
              - 'packages/server/requirements.txt'
              - 'packages/server/pyproject.toml'
              - 'packages/pdf-reader-mcp/requirements.txt'
              - 'packages/pdf-reader-mcp/pyproject.toml'
            workflows:
              - '.github/actions/**'
              - '.github/workflows/**'
            server_smoke:
              - '.github/workflows/ci.yml'
              - 'scripts/ci/smoke-test-server.sh'
              - 'packages/server/**'
              - 'Dockerfile'

  # ── Workflow validation ──
  workflow-lint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate GitHub Actions workflows
        uses: rhysd/actionlint@v1

  # ── Shell scripts: lint + syntax check ──
  shell-lint:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts with ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          ignore_paths: node_modules .git

      - name: Bash syntax check
        shell: bash
        run: |
          mapfile -d '' files < <(find . \
            -path './.git' -prune -o \
            -path './node_modules' -prune -o \
            -path './packages/server/.venv' -prune -o \
            -type f -name '*.sh' -print0)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo 'No shell scripts found.'
            exit 0
          fi

          printf 'Checking %s shell scripts\n' "${#files[@]}"
          for file in "${files[@]}"; do
            bash -n "$file"
          done

  # ── Python package build validation ──
  python-package-build:
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/pyproject.toml
            packages/pdf-reader-mcp/pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build server package
        if: needs.changes.outputs.server == 'true'
        run: python -m build packages/server --sdist --wheel --outdir packages/server/dist-ci

      - name: Build pdf-reader-mcp package
        if: needs.changes.outputs.mcp == 'true'
        run: python -m build packages/pdf-reader-mcp --sdist --wheel --outdir packages/pdf-reader-mcp/dist-ci

      - name: Smoke install built server wheel
        if: needs.changes.outputs.server == 'true'
        run: |
          python -m venv .ci-server-wheel
          .ci-server-wheel/bin/pip install --upgrade pip
          .ci-server-wheel/bin/pip install packages/server/dist-ci/*.whl
          .ci-server-wheel/bin/python -c "import increa_reader.pdf_processor"

      - name: Smoke install built pdf-reader-mcp wheel
        if: needs.changes.outputs.mcp == 'true'
        run: |
          python -m venv .ci-mcp-wheel
          .ci-mcp-wheel/bin/pip install --upgrade pip
          .ci-mcp-wheel/bin/pip install packages/pdf-reader-mcp/dist-ci/*.whl
          .ci-mcp-wheel/bin/python -c "import pdf_reader_server"

      - name: Upload built Python packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dists
          path: |
            packages/server/dist-ci/*
            packages/pdf-reader-mcp/dist-ci/*
          if-no-files-found: ignore
          retention-days: 7

  # ── Frontend: typecheck ──
  frontend-typecheck:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Type check
        run: pnpm --filter @increa-reader/ui typecheck

  # ── Frontend: lint + build ──
  frontend-lint-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Lint
        run: pnpm --filter @increa-reader/ui lint
      - name: Build UI
        run: pnpm --filter @increa-reader/ui build

  # ── Frontend: tests (vitest) ──
  frontend-test:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: UI tests (vitest)
        run: pnpm --filter @increa-reader/ui test

  # ── Frontend: test coverage (vitest) ──
  frontend-coverage:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: UI tests with coverage (vitest)
        run: pnpm --filter @increa-reader/ui test:cov
      - name: Upload coverage report (ui)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: |
            packages/ui/coverage/coverage-final.json
            packages/ui/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  # ── Python server: startup smoke test ──
  python-server-smoke:
    needs: changes
    if: needs.changes.outputs.server_smoke == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/server/pyproject.toml

      - name: Install Python dependencies (server runtime)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packages/server/requirements.txt

      - name: Smoke test FastAPI server startup
        run: bash scripts/ci/smoke-test-server.sh process "${GITHUB_WORKSPACE}"

  # ── Python server: lint + typecheck + test + coverage ──
  python-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/server/pyproject.toml

      - name: Install Python dependencies (server)
        run: |
          cd packages/server
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Python lint — black check (server)
        run: |
          cd packages/server
          black --check --diff .

      - name: Python lint — isort check (server)
        run: |
          cd packages/server
          isort --check-only --diff .

      - name: Type check — mypy (server)
        run: |
          cd packages/server
          python -m mypy increa_reader/ --ignore-missing-imports

      - name: Run server tests with coverage (pytest)
        run: |
          cd packages/server
          python -m pytest tests/ -v --tb=short \
            --cov=increa_reader \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Upload coverage report (server)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: packages/server/coverage.xml
          retention-days: 7

  # ── Python MCP: lint + test + coverage ──
  python-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: packages/pdf-reader-mcp/pyproject.toml

      - name: Install Python dependencies (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          pip install -e ".[dev]"

      - name: Python lint — ruff check (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          ruff check .

      - name: Run pdf-reader-mcp tests with coverage (pytest)
        run: |
          cd packages/pdf-reader-mcp
          python -m pytest tests/ -v \
            --cov=pdf_reader_server \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report (mcp)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-coverage
          path: packages/pdf-reader-mcp/coverage.xml
          retention-days: 7

  # ── Desktop (Tauri frontend): typecheck + production bundle ──
  desktop:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Type check (desktop)
        run: pnpm --filter @increa-reader/desktop typecheck
      - name: Build desktop frontend bundle
        run: cd packages/desktop && pnpm exec vite build
      - name: Upload desktop frontend bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-frontend-dist
          path: packages/desktop/dist
          if-no-files-found: error
          retention-days: 7

  desktop-distribution:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Create sample desktop bundle outputs
        run: |
          mkdir -p packages/desktop/src-tauri/target/release/bundle/deb
          mkdir -p packages/desktop/src-tauri/target/release/bundle/appimage
          printf 'fake deb payload\n' > packages/desktop/src-tauri/target/release/bundle/deb/increa-reader_1.0.0_amd64.deb
          printf 'fake appimage payload\n' > packages/desktop/src-tauri/target/release/bundle/appimage/Increa-Reader_1.0.0_amd64.AppImage
      - name: Stage desktop distribution manifest
        run: pnpm --filter @increa-reader/desktop build:desktop:stage
      - name: Validate desktop distribution manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          dist_dir = Path('packages/desktop/src-tauri/target/release/distribute')
          manifest = json.loads((dist_dir / 'manifest.json').read_text())
          names = {item['name'] for item in manifest['artifacts']}
          assert manifest['artifactCount'] == 2, manifest
          assert 'increa-reader_1.0.0_amd64.deb' in names, names
          assert 'Increa-Reader_1.0.0_amd64.AppImage' in names, names
          checksums = (dist_dir / 'SHA256SUMS.txt').read_text()
          assert 'increa-reader_1.0.0_amd64.deb' in checksums, checksums
          assert 'Increa-Reader_1.0.0_amd64.AppImage' in checksums, checksums
          print('desktop distribution manifest validated')
          PY
      - name: Upload desktop distribution bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distribution-manifest
          path: packages/desktop/src-tauri/target/release/distribute
          if-no-files-found: error
          retention-days: 7

  # ── Desktop Rust shell: format + compile check ──
  desktop-rust:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Check Rust formatting
        run: cargo fmt --manifest-path packages/desktop/src-tauri/Cargo.toml --all -- --check

      - name: Compile check desktop shell
        run: cargo check --manifest-path packages/desktop/src-tauri/Cargo.toml --locked

  # ── Security audit ──
  security:
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm

      - name: npm audit (high+ critical only)
        run: pnpm audit --audit-level high || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/pdf-reader-mcp/pyproject.toml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Pip audit (server)
        run: cd packages/server && pip-audit -r requirements.txt || true

      - name: Pip audit (pdf-reader-mcp)
        run: cd packages/pdf-reader-mcp && pip-audit || true

  # ── Test Summary ──
  test-summary:
    needs:
      - frontend-test
      - frontend-coverage
      - frontend-typecheck
      - frontend-lint-build
      - python-server
      - python-mcp
      - python-server-smoke
      - python-package-build
      - desktop
      - desktop-distribution
      - desktop-rust
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate test summary
        run: |
          echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          declare -A jobs=(
            ["frontend-test"]="${{ needs.frontend-test.result }}"
            ["frontend-coverage"]="${{ needs.frontend-coverage.result }}"
            ["frontend-typecheck"]="${{ needs.frontend-typecheck.result }}"
            ["frontend-lint-build"]="${{ needs.frontend-lint-build.result }}"
            ["python-server"]="${{ needs.python-server.result }}"
            ["python-mcp"]="${{ needs.python-mcp.result }}"
            ["python-server-smoke"]="${{ needs.python-server-smoke.result }}"
            ["python-package-build"]="${{ needs.python-package-build.result }}"
            ["desktop"]="${{ needs.desktop.result }}"
            ["desktop-distribution"]="${{ needs.desktop-distribution.result }}"
            ["desktop-rust"]="${{ needs.desktop-rust.result }}"
          )

          failed=0
          for job in "${!jobs[@]}"; do
            result="${jobs[$job]}"
            icon="✅"
            if [[ "$result" == "failure" ]]; then
              icon="❌"
              failed=1
            elif [[ "$result" == "skipped" ]]; then
              icon="⏭️"
            elif [[ "$result" == "cancelled" ]]; then
              icon="⚠️"
            fi
            echo "| $job | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ $failed -eq 0 ]]; then
            echo "**All jobs passed!** ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Some jobs failed** ❌ — check details above." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Docker build check ──
  docker:
    needs: [changes, frontend-typecheck, frontend-lint-build]
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: increa-reader:ci

      - name: Smoke test Docker image
        run: bash scripts/ci/smoke-test-server.sh container increa-reader:ci
