name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: typecheck + lint + build + test ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @increa-reader/ui typecheck

      - name: Lint
        run: pnpm --filter @increa-reader/ui lint

      - name: Build UI
        run: pnpm --filter @increa-reader/ui build

      - name: UI tests (vitest)
        run: pnpm --filter @increa-reader/ui test

  # ── Python server: lint + test ──
  python-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/pdf-reader-mcp/pyproject.toml

      - name: Install Python dependencies (server)
        run: |
          cd packages/server
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Python lint — black check (server)
        run: |
          cd packages/server
          black --check --diff .

      - name: Python lint — isort check (server)
        run: |
          cd packages/server
          isort --check-only --diff .

      - name: Run server tests (pytest)
        run: |
          cd packages/server
          python -m pytest tests/ -v --tb=short

  # ── Python MCP: lint + test ──
  python-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: packages/pdf-reader-mcp/pyproject.toml

      - name: Install Python dependencies (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          pip install -e ".[dev]"

      - name: Python lint — ruff check (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          ruff check .

      - name: Run pdf-reader-mcp tests
        run: pnpm --filter @increa/pdf-reader-mcp test

  # ── Docker build check ──
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, python-server, python-mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t increa-reader:ci .