name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'workspace/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'workspace/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      server: ${{ steps.filter.outputs.server }}
      mcp: ${{ steps.filter.outputs.mcp }}
      desktop: ${{ steps.filter.outputs.desktop }}
      docker: ${{ steps.filter.outputs.docker }}
      security: ${{ steps.filter.outputs.security }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/ui/**'
            server:
              - '.github/workflows/ci.yml'
              - 'packages/server/**'
            mcp:
              - '.github/workflows/ci.yml'
              - 'packages/pdf-reader-mcp/**'
            desktop:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/desktop/**'
              - 'packages/ui/**'
            docker:
              - 'Dockerfile'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/ui/**'
              - 'packages/server/**'
              - 'packages/pdf-reader-mcp/**'
            security:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/actions/setup-pnpm/**'
              - '.github/workflows/ci.yml'
              - 'packages/ui/package.json'
              - 'packages/server/requirements.txt'
              - 'packages/server/pyproject.toml'
              - 'packages/pdf-reader-mcp/requirements.txt'
              - 'packages/pdf-reader-mcp/pyproject.toml'

  # ── Frontend: typecheck ──
  frontend-typecheck:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Type check
        run: pnpm --filter @increa-reader/ui typecheck

  # ── Frontend: lint + build ──
  frontend-lint-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Lint
        run: pnpm --filter @increa-reader/ui lint
      - name: Build UI
        run: pnpm --filter @increa-reader/ui build

  # ── Frontend: tests (vitest) ──
  frontend-test:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: UI tests (vitest)
        run: pnpm --filter @increa-reader/ui test

  # ── Python server: lint + typecheck + test + coverage ──
  python-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/server/pyproject.toml

      - name: Install Python dependencies (server)
        run: |
          cd packages/server
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Python lint — black check (server)
        run: |
          cd packages/server
          black --check --diff .

      - name: Python lint — isort check (server)
        run: |
          cd packages/server
          isort --check-only --diff .

      - name: Type check — mypy (server)
        run: |
          cd packages/server
          python -m mypy increa_reader/ --ignore-missing-imports || true

      - name: Run server tests with coverage (pytest)
        run: |
          cd packages/server
          python -m pytest tests/ -v --tb=short \
            --cov=increa_reader \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0

      - name: Upload coverage report (server)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: packages/server/coverage.xml
          retention-days: 7

  # ── Python MCP: lint + test + coverage ──
  python-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: packages/pdf-reader-mcp/pyproject.toml

      - name: Install Python dependencies (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          pip install -e ".[dev]"

      - name: Python lint — ruff check (pdf-reader-mcp)
        run: |
          cd packages/pdf-reader-mcp
          ruff check .

      - name: Run pdf-reader-mcp tests with coverage (pytest)
        run: |
          cd packages/pdf-reader-mcp
          python -m pytest tests/ -v \
            --cov=pdf_reader_server \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0

      - name: Upload coverage report (mcp)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-coverage
          path: packages/pdf-reader-mcp/coverage.xml
          retention-days: 7

  # ── Desktop (Tauri): typecheck ──
  desktop:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Type check (desktop)
        run: pnpm --filter @increa-reader/desktop typecheck

  # ── Security audit ──
  security:
    needs: changes
    if: needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm

      - name: npm audit (high+ critical only)
        run: pnpm audit --audit-level high || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            packages/server/requirements.txt
            packages/pdf-reader-mcp/pyproject.toml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Pip audit (server)
        run: cd packages/server && pip-audit -r requirements.txt || true

      - name: Pip audit (pdf-reader-mcp)
        run: cd packages/pdf-reader-mcp && pip-audit || true

  # ── Docker build check ──
  docker:
    needs: [changes, frontend-typecheck, frontend-lint-build]
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: increa-reader:ci