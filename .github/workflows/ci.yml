name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"

jobs:
  # ── UI: typecheck, lint, test, build ──
  ui:
    name: "UI — Typecheck / Lint / Test / Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter @increa-reader/ui typecheck

      - name: Lint (Biome)
        run: pnpm --filter @increa-reader/ui lint

      - name: Test (Vitest)
        run: pnpm --filter @increa-reader/ui test

      - name: Build
        run: pnpm --filter @increa-reader/ui build

      - name: Upload UI coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: packages/ui/coverage/
          retention-days: 7

  # ── Python: lint + test across multiple versions ──
  python:
    name: "Python ${{ matrix.python-version }} — Lint + Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install server + dev deps
        run: pip install -e "packages/server[dev]"

      - name: Install pdf-reader-mcp + dev deps
        run: pip install -e "packages/pdf-reader-mcp[dev]"

      # Lint checks only on latest Python (avoid redundant failures)
      - name: Server lint — black check
        if: matrix.python-version == env.PYTHON_VERSION
        run: black --check --line-length 88 packages/server/

      - name: Server lint — isort check
        if: matrix.python-version == env.PYTHON_VERSION
        run: isort --check-only --profile black --line-length 88 packages/server/

      - name: PDF MCP lint — ruff check
        if: matrix.python-version == env.PYTHON_VERSION
        run: ruff check packages/pdf-reader-mcp/

      - name: PDF MCP lint — ruff format check
        if: matrix.python-version == env.PYTHON_VERSION
        run: ruff format --check packages/pdf-reader-mcp/

      # Tests run on all Python versions
      - name: Test server
        run: python -m pytest packages/server/tests/ -v --tb=short

      - name: Test pdf-reader-mcp
        run: python -m pytest packages/pdf-reader-mcp/tests/ -v --tb=short

      - name: Upload Python coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            packages/server/htmlcov/
            packages/pdf-reader-mcp/htmlcov/
          retention-days: 7

  # ── Docker: build verification ──
  docker:
    name: "Docker — Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ui, python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
