name: Dependency Inventory

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/*/package.json'
      - 'packages/*/pyproject.toml'
      - 'packages/*/requirements*.txt'
      - '.github/actions/setup-pnpm/**'
      - '.github/workflows/dependency-inventory.yml'
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

concurrency:
  group: dependency-inventory-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm

      - name: Generate pnpm workspace SBOM
        run: |
          mkdir -p artifacts/dependency-inventory
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --ignore-npm-errors \
            --output-reproducible \
            --output-file artifacts/dependency-inventory/node-sbom.json

      - name: Upload pnpm workspace SBOM
        uses: actions/upload-artifact@v4
        with:
          name: node-sbom
          path: artifacts/dependency-inventory/node-sbom.json
          if-no-files-found: error
          retention-days: 14

  python-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate Python dependency inventory
        shell: bash
        run: |
          mkdir -p artifacts/dependency-inventory
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          root = Path('.')
          targets = [
              {
                  'name': 'server',
                  'pyproject': root / 'packages/server/pyproject.toml',
                  'requirements': [root / 'packages/server/requirements.txt'],
              },
              {
                  'name': 'pdf-reader-mcp',
                  'pyproject': root / 'packages/pdf-reader-mcp/pyproject.toml',
                  'requirements': [],
              },
          ]

          inventory = {
              'schemaVersion': 1,
              'generatedFrom': 'dependency-inventory workflow',
              'packages': [],
          }

          for target in targets:
              pyproject_data = tomllib.loads(target['pyproject'].read_text(encoding='utf-8'))
              project = pyproject_data.get('project', {})
              requirement_files = []
              for requirements_path in target['requirements']:
                  entries = []
                  if requirements_path.exists():
                      entries = [
                          line.strip()
                          for line in requirements_path.read_text(encoding='utf-8').splitlines()
                          if line.strip() and not line.lstrip().startswith('#')
                      ]
                  requirement_files.append(
                      {
                          'path': requirements_path.as_posix(),
                          'dependencies': entries,
                      }
                  )

              inventory['packages'].append(
                  {
                      'name': target['name'],
                      'pyprojectPath': target['pyproject'].as_posix(),
                      'projectName': project.get('name'),
                      'version': project.get('version'),
                      'requiresPython': project.get('requires-python'),
                      'dependencies': project.get('dependencies', []),
                      'optionalDependencies': project.get('optional-dependencies', {}),
                      'requirementsFiles': requirement_files,
                  }
              )

          output_path = root / 'artifacts/dependency-inventory/python-inventory.json'
          output_path.write_text(
              json.dumps(inventory, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          print(f'wrote {output_path}')
          PY

      - name: Upload Python dependency inventory
        uses: actions/upload-artifact@v4
        with:
          name: python-dependency-inventory
          path: artifacts/dependency-inventory/python-inventory.json
          if-no-files-found: error
          retention-days: 14
