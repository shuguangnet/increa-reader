version: 2
updates:
  # ── JavaScript/TypeScript (pnpm) ──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - shuguangnet
    labels:
      - dependencies
      - javascript

  # ── Python (server) ──
  - package-ecosystem: pip
    directory: "/packages/server"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - shuguangnet
    labels:
      - dependencies
      - python

  # ── Python (pdf-reader-mcp) ──
  - package-ecosystem: pip
    directory: "/packages/pdf-reader-mcp"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - shuguangnet
    labels:
      - dependencies
      - python

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - shuguangnet
    labels:
      - dependencies
      - ci