[package]
name = "increa-reader"
version = "1.0.0"
description = "Increa Reader - Knowledge Management Desktop & Mobile App"
authors = ["Increa"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[lib]
name = "increa_reader"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "increa-reader"
path = "src/main.rs"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
futures = "0.3"
dirs = "6"

# Desktop-only: process management for local Python server
[target.'cfg(desktop)'.dependencies]
which = "7"

# Desktop-only (Unix): libc for PID signalling
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
