# Increa Reader — Android Gradle Properties
#
# These properties are used by the Tauri-generated Android project (gen/android/).
# Copy or symlink this file to gen/android/gradle.properties before building.
#
# Reference: https://v2.tauri.app/develop/building/#android

# ── Android SDK ──────────────────────────────────────────────────
android.useAndroidX=true
android.enableJetifier=true

# ── JVM Memory Allocation ───────────────────────────────────────
# Increase heap for Kotlin/Rust compilation (prevents OOM on CI)
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError

# ── Parallel Build ───────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# ── Kotlin ───────────────────────────────────────────────────────
kotlin.code.style=official

# ── R8/ProGuard ─────────────────────────────────────────────────
# Enable full mode for smaller APK. Rules in proguard-rules.pro.
android.enableR8.fullMode=true

# ── AndroidX ─────────────────────────────────────────────────────
android.nonTransitiveRClass=true

# ── Tauri-specific ──────────────────────────────────────────────
# Tells Tauri which native lib dir to use
TAURI_ANDROID_ASSETS_PACKAGE=com.increa.reader

# ── Signing (debug) ─────────────────────────────────────────────
# For release builds, create a keystore.properties with:
#   storeFile=/path/to/your/release.keystore
#   storePassword=YOUR_PASSWORD
#   keyAlias=YOUR_ALIAS
#   keyPassword=YOUR_PASSWORD
#
# Debug builds use the auto-generated debug keystore.
# See build-mobile.sh sign:android for details.